/**
 * android/app/build.gradle
 * App-level Gradle build script for NursingAiAssistant.
 *
 * Key settings:
 *   - minSdkVersion 24   → Required for BiometricPrompt API
 *   - largeHeap true     → Declared in AndroidManifest; allows GGUF model in RAM
 *   - assets.srcDirs     → Includes the models/ folder in the APK assets
 */

apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

react {
    // Use Hermes JS engine for better performance and lower memory usage
    hermesEnabled = true
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.nursingaiassistant"

    defaultConfig {
        applicationId "com.nursingaiassistant"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Read release credentials from environment variables — never hardcode.
            // Set these in your CI/CD environment or local shell before building.
            //   NURSING_STORE_FILE    = absolute path to release.keystore
            //   NURSING_STORE_PASS   = keystore password
            //   NURSING_KEY_ALIAS    = key alias
            //   NURSING_KEY_PASS     = key password
            if (System.getenv("NURSING_STORE_FILE")) {
                storeFile     file(System.getenv("NURSING_STORE_FILE"))
                storePassword System.getenv("NURSING_STORE_PASS")
                keyAlias      System.getenv("NURSING_KEY_ALIAS")
                keyPassword   System.getenv("NURSING_KEY_PASS")
            } else {
                // Fallback to debug keystore for local development only
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }

    // llama.rn NDK/C++ native build
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    defaultConfig {
        // existing fields already declared above; add NDK ABI filters here
        ndk {
            // arm64-v8a covers all modern Android phones; add x86_64 for emulators
            abiFilters "arm64-v8a", "x86_64"
        }
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    // Include the models/ directory in the APK assets bundle
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // SQLCipher — provides transparent AES-256 encryption for SQLite
    implementation "net.zetetic:android-database-sqlcipher:4.5.4"
    implementation "androidx.sqlite:sqlite:2.4.0"

    // Biometrics
    implementation "androidx.biometric:biometric:1.2.0-alpha05"
}
