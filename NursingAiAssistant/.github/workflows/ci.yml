name: CI — NursingAiAssistant

on:
  push:
    branches: [main, "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: JavaScript lint + unit tests ───────────────────────────────────
  test:
    name: JS Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: NursingAiAssistant/package.json

      - name: Install dependencies
        working-directory: NursingAiAssistant
        run: npm ci

      - name: Security audit
        working-directory: NursingAiAssistant
        run: npm audit --audit-level=moderate

      - name: Lint
        working-directory: NursingAiAssistant
        run: npx eslint src/ --ext .js --max-warnings 0

      - name: Unit tests
        working-directory: NursingAiAssistant
        run: npm test -- --ci --coverage --coverageReporters=text-summary

  # ── Job 2: Android build check ────────────────────────────────────────────
  android-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "microsoft"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: NursingAiAssistant/package.json

      - name: Install JS dependencies
        working-directory: NursingAiAssistant
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate debug keystore
        working-directory: NursingAiAssistant/android/app
        run: |
          keytool -genkeypair \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('NursingAiAssistant/android/**/*.gradle*') }}

      - name: Build debug APK
        working-directory: NursingAiAssistant/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: NursingAiAssistant/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ── Job 3: Release APK (main branch only) ────────────────────────────────
  release-build:
    name: Android Release Build
    runs-on: ubuntu-latest
    needs: android-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "microsoft"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: NursingAiAssistant/package.json

      - name: Install JS dependencies
        working-directory: NursingAiAssistant
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        working-directory: NursingAiAssistant/android/app
        env:
          NURSING_KEYSTORE_B64: ${{ secrets.NURSING_KEYSTORE_B64 }}
        run: echo "$NURSING_KEYSTORE_B64" | base64 -d > release.keystore

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('NursingAiAssistant/android/**/*.gradle*') }}

      - name: Build release APK
        working-directory: NursingAiAssistant/android
        env:
          NURSING_STORE_FILE: ${{ github.workspace }}/NursingAiAssistant/android/app/release.keystore
          NURSING_STORE_PASS: ${{ secrets.NURSING_STORE_PASS }}
          NURSING_KEY_ALIAS: ${{ secrets.NURSING_KEY_ALIAS }}
          NURSING_KEY_PASS: ${{ secrets.NURSING_KEY_PASS }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: NursingAiAssistant/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
